<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Claude Opus 4.7</title>

  <script src="https://js.puter.com/v2/"></script>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    textarea{
      width:100%;
      height:120px;
      border:none;
      border-radius:12px;
      padding:12px;
      background:#1e293b;
      color:white;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:black;
      font-size:16px;
      font-weight:bold;
    }

    #output{
      margin-top:20px;
      white-space:pre-wrap;
      background:#111827;
      padding:15px;
      border-radius:12px;
      line-height:1.5;
    }
  </style>
</head>

<body>

<h2>Claude Opus 4.7</h2>

<textarea
id="prompt"
placeholder="Type message..."></textarea>

<button onclick="chat()">Send</button>

<div id="output"></div>

<script>
async function chat() {

  const output =
    document.getElementById("output");

  const prompt =
    document.getElementById("prompt").value;

  output.innerText = "Thinking...";

  try {

    // Login once
    try {
      await puter.auth.getUser();
    } catch {
      await puter.auth.signIn();
    }

    // CLAUDE OPUS 4.7
    const response = await puter.ai.chat(
      prompt,
      {
        model: "claude-opus-4-7"
      }
    );

    console.log(response);

    // Fix object output
    let text = "";

    if (typeof response === "string") {
      text = response;
    }

    else if (response?.message?.content) {

      if (Array.isArray(response.message.content)) {

        text = response.message.content
          .map(part => part.text || "")
          .join("");

      } else {

        text = response.message.content;

      }
    }

    else if (response?.text) {

      text = response.text;

    }

    else {

      text = JSON.stringify(
        response,
        null,
        2
      );
    }

    output.innerText = text;

  } catch(err) {

    output.innerText =
      "Error:\n" + err.message;

    console.error(err);
  }
}
</script>

</body>
</html>
