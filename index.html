<!DOCTYPE html>
<html>
<head>
    <title>Claude Opus 4-7 Chat</title>
    <script src="https://js.puter.com/v2/"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 25%;
            background: #111827;
            padding: 10px;
            overflow-y: auto;
        }

        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user { background: #2563eb; }
        .ai { background: #374151; }

        #inputArea {
            display: flex;
            padding: 10px;
            gap: 5px;
            background: #1e293b;
        }

        input, button {
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        input {
            flex: 1;
        }

        button {
            cursor: pointer;
        }

        #fileInput {
            display: none;
        }

        .fileBtn { background: #22c55e; color: white; }

        .small { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>

<body>

<div id="sidebar">
    <h3>Files</h3>
    <button onclick="document.getElementById('fileInput').click()">+ Add Files</button>
    <input type="file" id="fileInput" multiple />
    <div id="fileList" class="small"></div>
</div>

<div id="chat">
    <div id="messages"></div>

    <div id="inputArea">
        <input id="text" placeholder="Type your message..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let chatHistory = [];
let uploadedFiles = [];

const messages = document.getElementById("messages");
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

fileInput.onchange = async (e) => {
    for (let file of e.target.files) {
        const uploaded = await puter.fs.write(
            "file_" + Date.now() + "_" + file.name,
            file
        );
        uploadedFiles.push(uploaded.path);
    }
    renderFiles();
};

function renderFiles(){
    fileList.innerHTML = uploadedFiles
        .map(f => "📎 " + f.split("/").pop())
        .join("<br>");
}

function addMsg(role, text){
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function send(){
    const input = document.getElementById("text");
    const text = input.value.trim();
    if(!text && uploadedFiles.length === 0) return;
    input.value = "";

    addMsg("user", text || "[Files attached]");

    await puter.auth.getUser().catch(() => puter.auth.signIn());

    // Build the message content
    let content = [];

    for(let f of uploadedFiles){
        content.push({ type: "file", puter_path: f });
    }

    if(text) content.push({ type: "text", text: text });

    chatHistory.push({ role: "user", content });

    const stream = await puter.ai.chat(chatHistory, {
        model: "anthropic/claude-opus-4-7",
        stream: true
    });

    let reply = "";
    let lastMsg = document.createElement("div");
    lastMsg.className = "msg ai";
    messages.appendChild(lastMsg);

    for await (const chunk of stream) {
        let t = "";

        if (typeof chunk === "string") t = chunk;
        else if (chunk?.text) t = chunk.text;
        else if (chunk?.message?.content) {
            t = Array.isArray(chunk.message.content)
                ? chunk.message.content.map(x => x.text || "").join("")
                : chunk.message.content;
        }

        reply += t;
        lastMsg.innerText = reply;  // ✅ no [object Object]
        messages.scrollTop = messages.scrollHeight;
    }

    chatHistory.push({ role: "assistant", content: reply });

    // Clear uploaded files after sending
    uploadedFiles = [];
    renderFiles();
}
</script>

</body>
</html>
