<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 4.7 Studio</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0d11; color: #f1f5f9; }
        .sidebar-active { transform: translateX(0) !important; }
        .chat-area { scroll-behavior: smooth; }
        .user-bubble { background: #1e2025; border: 1px solid #2d3139; }
        pre { background: #000; padding: 1rem; border-radius: 0.75rem; border: 1px solid #334155; margin: 10px 0; overflow-x: auto; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#0b0d11] border-r border-white/5 z-40 transform -translateX-full transition-transform duration-300 lg:relative lg:translate-x-0 flex flex-col">
        <div class="p-4 border-b border-white/5 flex items-center justify-between">
            <span class="font-bold text-orange-500">Claude Studio</span>
            <button onclick="createNewChat()" class="p-2 hover:bg-white/5 rounded-lg text-slate-400">＋ New</button>
        </div>
        <div id="chat-list" class="flex-1 overflow-y-auto p-2 space-y-1 hide-scrollbar">
            <!-- Chats populated here -->
        </div>
        <div class="p-4 border-t border-white/5">
            <button id="auth-btn" class="w-full py-2 bg-white/5 hover:bg-white/10 rounded-lg text-xs">Sign in to Puter</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative min-w-0">
        <!-- Navbar -->
        <nav class="h-14 border-b border-white/5 flex items-center justify-between px-4 lg:px-6 bg-[#0b0d11]/80 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 text-slate-400">☰</button>
                <span id="current-chat-title" class="text-sm font-medium truncate max-w-[150px] md:max-w-xs">New Chat</span>
            </div>
            <span class="text-[10px] text-slate-500 hidden sm:inline uppercase tracking-widest font-bold">Opus 4.7 Engine</span>
        </nav>

        <!-- Chat Feed -->
        <div id="chat-feed" class="flex-1 overflow-y-auto chat-area px-4">
            <div id="msg-wrapper" class="max-w-4xl mx-auto py-10 space-y-10">
                <!-- Messages populated here -->
            </div>
        </div>

        <!-- Input Section -->
        <footer class="w-full max-w-4xl mx-auto px-4 pb-6 pt-2">
            <div id="file-tray" class="flex flex-wrap gap-2 mb-2"></div>
            <div class="bg-[#1e2025] border border-[#2d3139] rounded-3xl p-2 flex items-end gap-2 shadow-2xl">
                <label class="bg-[#4a4a4a] hover:bg-[#5a5a5a] cursor-pointer text-slate-200 px-4 py-2.5 rounded-2xl text-xs font-medium flex-shrink-0 transition">
                    + Add Files
                    <input type="file" id="file-input" class="hidden" multiple>
                </label>
                <textarea id="user-input" rows="1" placeholder="Ask Claude..." 
                    class="flex-1 bg-transparent py-3 px-2 focus:outline-none resize-none text-slate-100 max-h-60"></textarea>
                <button id="send-btn" class="bg-white text-black p-3 rounded-2xl hover:bg-slate-200 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </footer>
    </main>

    <script>
        let chats = JSON.parse(localStorage.getItem('claude_chats') || '[]');
        let currentChatId = localStorage.getItem('current_chat_id') || null;
        let pendingFiles = [];

        const msgWrapper = document.getElementById('msg-wrapper');
        const chatFeed = document.getElementById('chat-feed');
        const userInput = document.getElementById('user-input');
        const fileTray = document.getElementById('file-tray');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('mobile-overlay').classList.toggle('hidden');
        }

        function createNewChat() {
            const id = Date.now().toString();
            const newChat = { id, title: 'New Chat', messages: [] };
            chats.unshift(newChat);
            saveChats();
            loadChat(id);
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function saveChats() {
            localStorage.setItem('claude_chats', JSON.stringify(chats));
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            chats.forEach(chat => {
                const btn = document.createElement('div');
                btn.className = `p-3 text-sm rounded-lg cursor-pointer transition flex items-center justify-between ${chat.id === currentChatId ? 'bg-white/10 text-white' : 'text-slate-400 hover:bg-white/5'}`;
                btn.innerHTML = `<span class="truncate pr-2">${chat.title}</span><button onclick="deleteChat(event, '${chat.id}')" class="hover:text-red-400 text-[10px]">✕</button>`;
                btn.onclick = () => loadChat(chat.id);
                list.appendChild(btn);
            });
        }

        function loadChat(id) {
            currentChatId = id;
            localStorage.setItem('current_chat_id', id);
            const chat = chats.find(c => c.id === id);
            document.getElementById('current-chat-title').innerText = chat.title;
            msgWrapper.innerHTML = '';
            chat.messages.forEach(m => appendMessage(m.role, m.content));
            renderChatList();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) currentChatId = chats[0]?.id || null;
            saveChats();
            if (currentChatId) loadChat(currentChatId);
            else createNewChat();
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? "flex justify-end" : "flex gap-4";
            const text = Array.isArray(content) ? content.find(c => c.type === 'text')?.text : content;
            
            if (role === 'user') {
                div.innerHTML = `<div class="user-bubble px-5 py-3 rounded-2xl max-w-[85%] text-slate-200">${text}</div>`;
            } else {
                div.innerHTML = `<div class="w-8 h-8 rounded-full bg-orange-600 flex-shrink-0 flex items-center justify-center font-bold text-xs">C</div>
                                 <div class="text-slate-300 max-w-2xl pt-1 leading-relaxed">${text}</div>`;
            }
            msgWrapper.appendChild(div);
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        document.getElementById('file-input').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const uploaded = await puter.fs.upload(file);
                pendingFiles.push({ type: 'file', puter_path: uploaded.path, name: uploaded.name });
                const chip = document.createElement('div');
                chip.className = "bg-white/5 border border-white/10 px-3 py-1.5 rounded-xl text-[10px] text-slate-400";
                chip.innerText = uploaded.name;
                fileTray.appendChild(chip);
            }
        };

        async function send() {
            const text = userInput.value.trim();
            if (!text && pendingFiles.length === 0) return;
            if (!currentChatId) createNewChat();

            const currentChat = chats.find(c => c.id === currentChatId);
            const userContent = [];
            if (text) userContent.push({ type: 'text', text });
            pendingFiles.forEach(f => userContent.push({ type: 'file', puter_path: f.puter_path }));
            
            currentChat.messages.push({ role: 'user', content: userContent });
            if (currentChat.title === 'New Chat') currentChat.title = text.substring(0, 30) || 'Attachment Only';
            
            appendMessage('user', userContent);
            userInput.value = '';
            fileTray.innerHTML = '';
            
            const aDiv = document.createElement('div');
            aDiv.className = "flex gap-4";
            aDiv.innerHTML = `<div class="w-8 h-8 rounded-full bg-orange-600 flex-shrink-0 flex items-center justify-center font-bold text-xs">C</div>
                              <div class="ai-stream text-slate-300 max-w-2xl pt-1 leading-relaxed italic">...</div>`;
            msgWrapper.appendChild(aDiv);
            const target = aDiv.querySelector('.ai-stream');

            try {
                // anthropic/claude-opus-4-7 is the valid Puter model ID
                const response = await puter.ai.chat(currentChat.messages, false, { model: 'anthropic/claude-opus-4-7', stream: true });
                let full = "";
                target.classList.remove('italic');
                for await (const part of response) {
                    if (part?.text) {
                        full += part.text;
                        target.innerText = full;
                        chatFeed.scrollTop = chatFeed.scrollHeight;
                    }
                }
                currentChat.messages.push({ role: 'assistant', content: full });
                saveChats();
            } catch (err) { target.innerText = "Error: " + err.message; }
            pendingFiles = [];
        }

        document.getElementById('send-btn').onclick = send;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
        document.getElementById('auth-btn').onclick = () => puter.auth.signIn();

        // Initialize
        if (!currentChatId && chats.length > 0) loadChat(chats[0].id);
        else if (chats.length === 0) createNewChat();
        else loadChat(currentChatId);
    </script>
</body>
</html>
