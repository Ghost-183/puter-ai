<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Opus 4.7 Workspace</title>
    <!-- Puter.js SDK -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 160px); }
        .artifact-pane { border-left: 1px solid #e5e7eb; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        .message-user { background: #f3f4f6; align-self: flex-end; }
        .message-assistant { background: #ffffff; border: 1px solid #e5e7eb; align-self: flex-start; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4 bg-white shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-xl font-bold text-orange-600">Claude</span>
            <span class="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded">Opus 4.7</span>
        </div>
        <div class="text-sm text-gray-500">Puter Cloud API Interface</div>
    </header>

    <!-- Main Workspace -->
    <main class="flex h-[calc(100vh-73px)]">
        
        <!-- Left: Chat Pane -->
        <section class="flex-1 flex flex-col p-4 md:p-6 max-w-3xl mx-auto w-full">
            <div id="chat-history" class="chat-container overflow-y-auto flex flex-col gap-4 mb-4 pr-2">
                <!-- Welcome Message -->
                <div class="message-assistant p-4 rounded-2xl max-w-[85%]">
                    Hello! I am Claude Opus 4.7. How can I help you today? You can attach files or ask me to write code, which I'll display in the side pane.
                </div>
            </div>

            <!-- Input Area -->
            <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-2">
                <div id="file-preview" class="flex gap-2 p-2 hidden"></div>
                <div class="flex items-end gap-2">
                    <label class="p-3 cursor-pointer hover:bg-gray-100 rounded-xl transition">
                        <input type="file" id="file-input" class="hidden" multiple>
                        <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </label>
                    <textarea id="user-input" rows="1" class="flex-1 p-3 focus:outline-none resize-none" placeholder="Message Claude..."></textarea>
                    <button id="send-btn" class="bg-black text-white p-3 rounded-xl hover:bg-gray-800 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Right: Side Pane (Artifacts/Preview) -->
        <aside id="side-pane" class="hidden md:flex flex-1 flex-col bg-white artifact-pane">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="font-semibold text-gray-700">Artifacts & Files</h2>
                <button onclick="document.getElementById('side-pane').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            <div id="artifact-content" class="p-6 overflow-y-auto">
                <div class="text-center text-gray-400 mt-20">
                    Code, documents, and complex data will appear here side-by-side.
                </div>
            </div>
        </aside>
    </main>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const artifactContent = document.getElementById('artifact-content');
        const sidePane = document.getElementById('side-pane');

        let messages = [];
        let attachedFiles = [];

        // Handle File Selection
        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;

            // Upload files to Puter's temporary storage
            const uploaded = await puter.fs.upload(files);
            const fileArr = Array.isArray(uploaded) ? uploaded : [uploaded];
            
            fileArr.forEach(f => {
                attachedFiles.push({ type: 'file', puter_path: f.path, name: f.name });
                const chip = document.createElement('div');
                chip.className = "bg-gray-100 px-3 py-1 rounded-full text-xs flex items-center gap-2 border";
                chip.innerHTML = `<span>${f.name}</span>`;
                document.getElementById('file-preview').classList.remove('hidden');
                document.getElementById('file-preview').appendChild(chip);
            });
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && attachedFiles.length === 0) return;

            // 1. Update UI (User Message)
            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = "message-user p-4 rounded-2xl max-w-[85%] shadow-sm";
            userMsgDiv.textContent = text;
            chatHistory.appendChild(userMsgDiv);
            
            // Prepare message content (Multimodal)
            const content = [];
            if (text) content.push({ type: 'text', text: text });
            attachedFiles.forEach(f => content.push({ type: 'file', puter_path: f.puter_path }));
            
            messages.push({ role: 'user', content: content });
            
            // Reset Input
            userInput.value = '';
            attachedFiles = [];
            document.getElementById('file-preview').innerHTML = '';
            document.getElementById('file-preview').classList.add('hidden');

            // 2. Assistant Placeholder
            const assistantMsgDiv = document.createElement('div');
            assistantMsgDiv.className = "message-assistant p-4 rounded-2xl max-w-[85%] prose";
            chatHistory.appendChild(assistantMsgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                // 3. Call Puter AI API (Claude Opus 4.7)
                const response = await puter.ai.chat(messages, {
                    model: 'claude-opus-4-7',
                    stream: true
                });

                let fullText = '';
                for await (const part of response) {
                    if (part?.text) {
                        fullText += part.text;
                        assistantMsgDiv.innerText = fullText; // Using innerText to show raw stream
                        chatHistory.scrollTop = chatHistory.scrollHeight;
                        
                        // Detect Code Blocks for Side Pane (Artifacts)
                        if (fullText.includes('```')) {
                            sidePane.classList.remove('hidden');
                            const codeMatch = fullText.match(/
```([\s\S]*?)```/);
                            if (codeMatch) {
                                artifactContent.innerHTML = `<pre><code>${codeMatch[1]}</code></pre>`;
                            }
                        }
                    }
                }
                messages.push({ role: 'assistant', content: fullText });
            } catch (err) {
                assistantMsgDiv.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
    </script>
</body>
</html>
