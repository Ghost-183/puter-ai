<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
    <script src="https://js.puter.com/v2/"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        .container {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
        }

        .upload-area {
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            border-radius: 5px;
            cursor: pointer;
        }

        .upload-area.dragover {
            border-color: #007bff;
            background: #f8f9fa;
        }

        input { display: none; }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:disabled { background: #ccc; }

        #response {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            white-space: pre-wrap;
            display: none;
        }

        .file-name {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Resume Analyzer</h1>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        Click or drop resume here
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt">
    </div>

    <div class="file-name" id="fileName"></div>

    <button id="analyzeBtn" disabled>Analyze</button>

    <div id="response"></div>
</div>

<script>

let fileData = null;

const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");
const btn = document.getElementById("analyzeBtn");
const response = document.getElementById("response");
const uploadArea = document.querySelector(".upload-area");

fileInput.onchange = e => setFile(e.target.files[0]);

uploadArea.ondragover = e => {
    e.preventDefault();
    uploadArea.classList.add("dragover");
};

uploadArea.ondragleave = () => {
    uploadArea.classList.remove("dragover");
};

uploadArea.ondrop = e => {
    e.preventDefault();
    uploadArea.classList.remove("dragover");
    setFile(e.dataTransfer.files[0]);
};

function setFile(file){
    fileData = file;
    fileName.innerText = "Selected: " + file.name;
    btn.disabled = false;
}

btn.onclick = async () => {

    btn.disabled = true;
    btn.innerText = "Analyzing...";
    response.style.display = "none";
    response.innerText = "";

    try {

        await puter.auth.getUser().catch(() => puter.auth.signIn());

        const uploaded = await puter.fs.write(
            "resume_" + Date.now() + "." + fileData.name.split(".").pop(),
            fileData
        );

        const stream = await puter.ai.chat([
            {
                role: "user",
                content: [
                    { type: "file", puter_path: uploaded.path },
                    { type: "text", text: "Analyze this resume in 2-3 short sentences." }
                ]
            }
        ], {
            model: "anthropic/claude-opus-4-7",
            stream: true
        });

        let finalText = "";

        for await (const chunk of stream) {

            // 🔥 FIX: safely extract text ONLY
            let textPart = "";

            if (typeof chunk === "string") {
                textPart = chunk;
            }
            else if (chunk?.text) {
                textPart = chunk.text;
            }
            else if (chunk?.message?.content) {
                textPart = Array.isArray(chunk.message.content)
                    ? chunk.message.content.map(x => x.text || "").join("")
                    : chunk.message.content;
            }

            finalText += textPart;

            response.style.display = "block";
            response.innerText = finalText; // ❌ never object
        }

        await puter.fs.delete(uploaded.path);

    } catch (err) {
        response.style.display = "block";
        response.innerText = "Error: " + (err?.message || err);
    }

    btn.disabled = false;
    btn.innerText = "Analyze";
};

</script>

</body>
</html>
